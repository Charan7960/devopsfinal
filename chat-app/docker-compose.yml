# ──────────────────────────────────────────────────────────────────
#  SERVICES
# ──────────────────────────────────────────────────────────────────
services:

  # ── 1. NGINX — Load Balancer ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chatscale-nginx
    ports:
      - "80:80"         # Expose port 80 to the host (browser goes here)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - chat-server
    restart: unless-stopped
    networks:
      - chat-network

  # ── 2. CHAT SERVER — Scalable Node.js + Socket.IO ────────────────
  chat-server:
    build:
      context: ./chat-server
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/chatapp
      # HOSTNAME is automatically set by Docker to the container ID
      # This is used as the SERVER_ID so you can see which container handled each message
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped
    networks:
      - chat-network
    # Note: No ports exposed here — Nginx is the only entry point
    # Scale with: docker-compose up --scale chat-server=3

  # ── 3. REDIS — Message Broker (Pub/Sub) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatscale-redis
    ports:
      - "6379:6379"     # Exposed for debugging (optional)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. MONGODB — Message Persistence ────────────────────────────
  mongodb:
    image: mongo:7
    container_name: chatscale-mongodb
    ports:
      - "27017:27017"   # Exposed for debugging with MongoDB Compass (optional)
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ──────────────────────────────────────────────────────────────────
#  NAMED VOLUMES — Data persists even if containers restart
# ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  mongo-data:

# ──────────────────────────────────────────────────────────────────
#  NETWORK — All containers talk to each other on this private network
# ──────────────────────────────────────────────────────────────────
networks:
  chat-network:
    driver: bridge
